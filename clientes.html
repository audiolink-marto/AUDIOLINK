<!-- AUDIOLINK · clientes.html · v1.1
     V1.1: se migra acá el Portal de clientes completo (antes modal en
     proyecto.html, ver plan de migración acordado). Ahora esta página
     puede activar/reenviar/revocar acceso real (Firebase Auth vía app
     secundaria appPortal/authPortal, mismo patrón que proyecto.html) y
     ya no solo mostrarlo en modo lectura. El listener existente sobre
     clientesAccesoRef (v1.0) se reutiliza tal cual — no se duplica —
     así que clientesAccesoCache queda siempre al día sin necesidad de
     recargarlo al abrir el modal. Se agrega un listener propio sobre
     proyectosRef (variable nueva proyectosParaPortal) porque
     getClientesUnicos() necesita ver los proyectos en vivo y v1.0 solo
     los consultaba puntualmente (sembrarDesdeProyectos). El badge de
     estado del portal en la vista Detalle ahora es clickeable y abre el
     modal prefiltrado por el email de ese cliente; el badge del listado
     (dentro de las tarjetas) se deja como estaba, solo informativo, para
     no chocar con el click que abre el detalle. Se agrega también un
     botón "Portal de clientes" en el header del listado para abrir el
     modal general sin filtro. Se agrega portalActionCodeSettings
     (url: https://audiolink-marto.github.io/AUDIOLINK/portal.html) en
     ambas llamadas a sendPasswordResetEmail (_pcActivar y _pcReenviar) —
     antes el correo dejaba al cliente en una página genérica de Firebase
     sin volver al portal; ahora el correo trae un botón "Continuar" de
     regreso a portal.html. proyecto.html se limpia en paralelo (→ v4.13):
     se retira de ahí el modal y las funciones equivalentes, que quedan
     viviendo solo acá.
     V1.0: primera versión. CRUD de clientes (colección Firestore 'clientes',
     doc id = auto-generado por Firestore, no el email — así se puede editar
     el correo después sin romper el documento). Campos: nombre, email,
     telefono, notas, activo, fechaCreacion. El historial de proyectos de
     cada cliente NO se guarda duplicado aquí: se consulta en vivo con un
     query a proyectos.where('clienteId','==', id). Incluye botón "Sembrar
     desde proyectos existentes": lee todos los proyectos, deduplica por
     clienteEmail (mismo criterio que ya usaba getClientesUnicos() en
     proyecto.html) y crea un doc en 'clientes' por cada uno que no exista
     todavía (match por email en minúsculas).
     Nav v2.7 estándar (sidebar desktop colapsable + mobile topbar/
     bottomnav/panel "···") vía nav.js v1.1, mismo patrón que el resto de
     Audiolink. -->

<style>

  z-index:9999;
}

<script>
// ============ FIREBASE CONFIG ============
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const clientesRef = db.collection('clientes');
const clientesAccesoRef = db.collection('clientesAcceso');
const proyectosRef = db.collection('proyectos');

// ===== APP SECUNDARIA (v1.1 — migrado de proyecto.html v2.0) =====
// signInWithEmailAndPassword / createUserWithEmailAndPassword cierran/reemplazan
// la sesión activa en la instancia donde se llaman. Usamos una segunda instancia
// de Firebase solo para crear/gestionar la cuenta del cliente, sin tocar tu
// sesión de staff en la app principal. Mismo patrón usado en proyecto.html.
const appPortal = firebase.initializeApp(firebaseConfig, 'portal-activador');
const authPortal = appPortal.auth();
// v1.1: sin esto, Firebase deja al cliente en una página genérica propia
// tras crear/cambiar su contraseña, sin volver a nuestro portal. Con
// url apuntando a portal.html, el correo muestra un botón "Continuar"
// que lo trae de vuelta acá. handleCodeInApp:false porque portal.html
// no procesa el oobCode — solo queremos el link de regreso.
const portalActionCodeSettings = {
  url: 'https://audiolink-marto.github.io/AUDIOLINK/portal.html',
  handleCodeInApp: false
};

// ============ GUARD DE SESIÓN ============
auth.onAuthStateChanged(async (user) => {
  if(!user){ window.location.href = 'login.html'; return; }
  try{
    const doc = await db.collection('equipoInterno').doc(user.email).get();
    if(!doc.exists || doc.data().activo !== true){
      await auth.signOut();
      window.location.href = 'login.html';
      return;
    }
  } catch(e){
    console.error('Error validando sesión:', e);
    window.location.href = 'login.html';
  }
});

// ============ ESTADO ============
let clientes = [];
let clientesAccesoCache = {}; // email -> {authUid, portalRevocado}
let clienteActualId = null;
let editando = false;

function escapeHtml(str){
  if(str === null || str === undefined) return '';
  return String(str)
    .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
    .replaceAll('"','&quot;').replaceAll("'",'&#39;');
}

// ============ LISTENER TIEMPO REAL ============
clientesRef.orderBy('nombre').onSnapshot(snap => {
  clientes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderListado();
  if(clienteActualId) renderDetalle();
}, err => console.error('Error escuchando clientes:', err));

clientesAccesoRef.onSnapshot(snap => {
  clientesAccesoCache = {};
  snap.forEach(d => clientesAccesoCache[d.id] = d.data());
  renderListado();
  if(clienteActualId) renderDetalle();
}, err => console.error('Error escuchando clientesAcceso:', err));

// v1.1: listener propio en vivo (proyectosRef ya existía pero solo se
// consultaba puntual en sembrarDesdeProyectos). Lo necesita
// getClientesUnicos() del Portal de clientes migrado.
let proyectosParaPortal = [];
proyectosRef.onSnapshot(snap => {
  proyectosParaPortal = snap.docs.map(d => d.data());
}, err => console.error('Error escuchando proyectos (portal):', err));

function estadoPortal(email){
  const acc = email ? clientesAccesoCache[email.toLowerCase()] : null;
  if(!acc) return { label:'Sin portal', cls:'faint' };
  if(acc.portalRevocado) return { label:'Portal revocado', cls:'warn' };
  return { label:'Portal activo', cls:'ok' };
}

// ============ MODAL: PORTAL DE CLIENTES (v1.1 — migrado de proyecto.html v2.0) ============
// clientesAccesoCache ya se mantiene actualizado en vivo por el onSnapshot
// de más arriba (v1.0) — a diferencia de proyecto.html, acá NO hace falta
// una función de recarga manual al abrir el modal.
function abrirModalPortalClientes(emailPrefill){
  document.getElementById('portalErr').textContent = '';
  document.getElementById('portalBuscador').value = emailPrefill || '';
  renderListaPortalClientes();
  document.getElementById('modalPortalBg').classList.add('active');
}

function cerrarModalPortalClientes(){
  document.getElementById('modalPortalBg').classList.remove('active');
}

function getClientesUnicos(){
  const term = document.getElementById('portalBuscador').value.trim().toLowerCase();
  const mapa = {};
  proyectosParaPortal.forEach(p => {   // ← único cambio real: proyectos → proyectosParaPortal
    const email = (p.clienteEmail || '').trim().toLowerCase();
    if(!email) return;
    if(!mapa[email]){
      mapa[email] = { email, nombre: p.clienteArtista || email };
    }
  });
  return Object.values(mapa)
    .filter(c => !term || c.nombre.toLowerCase().includes(term) || c.email.includes(term))
    .sort((a,b) => a.nombre.localeCompare(b.nombre));
}

function renderListaPortalClientes(){
  const cont = document.getElementById('portalLista');
  const clientesPortal = getClientesUnicos();
  if(clientesPortal.length === 0){
    cont.innerHTML = '<div class="empty" style="padding:20px;">No hay proyectos con correo de cliente registrado.</div>';
    return;
  }
  cont.innerHTML = clientesPortal.map(c => {
    const acc = clientesAccesoCache[c.email];
    let badgeClass, badgeTxt, acciones;
    if(!acc || !acc.authUid){
      badgeClass = 'warn'; badgeTxt = 'Sin activar';
      acciones = `<button class="btn" onclick="window._pcActivar('${c.email}')">Activar</button>`;
    } else if(acc.portalRevocado){
      badgeClass = 'err'; badgeTxt = 'Revocado';
      acciones = `
        <button class="btn btn-ghost" onclick="window._pcReenviar('${c.email}')">Reenviar correo</button>
        <button class="btn" onclick="window._pcRevocar('${c.email}', false)">Reactivar</button>`;
    } else {
      badgeClass = 'ok'; badgeTxt = 'Activado';
      acciones = `
        <button class="btn btn-ghost" onclick="window._pcReenviar('${c.email}')">Reenviar correo</button>
        <button class="btn btn-ghost" onclick="window._pcRevocar('${c.email}', true)">Revocar</button>`;
    }
    return `
      <div style="border:1px solid var(--brd);border-radius:8px;padding:14px 16px;background:var(--surf-light);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <strong>${escapeHtml(c.nombre)}</strong>
          <span class="badge ${badgeClass}">${badgeTxt}</span>
        </div>
        <div style="color:var(--muted);font-size:0.82rem;margin-bottom:10px;">${escapeHtml(c.email)}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${acciones}
          <button class="btn btn-ghost" onclick="window._pcPreview('${c.email}')">👁️ Vista previa</button>
        </div>
      </div>`;
  }).join('');
}

window._pcActivar = async function(email){
  if(!confirm(`¿Activar el portal para ${email}? Se creará una cuenta y se le enviará un correo para crear su contraseña.`)) return;
  try{
    const passTemp = Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
    const cred = await authPortal.createUserWithEmailAndPassword(email, passTemp);
    await clientesAccesoRef.doc(email).set({
      authUid: cred.user.uid,
      portalRevocado: false,
      creadoEn: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
    await authPortal.sendPasswordResetEmail(email, portalActionCodeSettings);
    await authPortal.signOut();
    clientesAccesoCache[email] = { authUid: cred.user.uid, portalRevocado: false };
    renderListaPortalClientes();
  } catch(err){
    console.error(err);
    if(err.code === 'auth/email-already-in-use'){
      alert('Ese correo ya tiene una cuenta de portal creada. Verifica el correo o usa "Reenviar correo".');
    } else {
      alert('No pudimos activar el portal. Revisa la consola.');
    }
  }
};

window._pcReenviar = async function(email){
  try{
    await authPortal.sendPasswordResetEmail(email, portalActionCodeSettings);
    alert(`Correo de acceso reenviado a ${email}.`);
  } catch(err){
    console.error(err);
    alert('No pudimos reenviar el correo.');
  }
};

window._pcRevocar = async function(email, nuevoEstado){
  const accion = nuevoEstado ? 'revocar' : 'reactivar';
  if(!confirm(`¿Seguro que quieres ${accion} el acceso al portal de ${email}?`)) return;
  try{
    await clientesAccesoRef.doc(email).set({ portalRevocado: nuevoEstado }, { merge: true });
    clientesAccesoCache[email] = { ...(clientesAccesoCache[email] || {}), portalRevocado: nuevoEstado };
    renderListaPortalClientes();
  } catch(err){
    console.error(err);
    alert('No pudimos actualizar el acceso.');
  }
};

window._pcPreview = function(email){
  window.open(`portal.html?preview=${encodeURIComponent(email)}`, '_blank');
};

// ============ LISTADO ============
function renderListado(){
  const q = (document.getElementById('buscador').value || '').trim().toLowerCase();
  const filtrados = clientes.filter(c =>
    !q || (c.nombre||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q)
  );
  const grid = document.getElementById('gridClientes');
  document.getElementById('emptyState').style.display = clientes.length ? 'none' : 'block';
  grid.style.display = clientes.length ? 'grid' : 'none';
  grid.innerHTML = filtrados.map(c => {
    const portal = estadoPortal(c.email);
    return `
    <div class="card" onclick="verDetalle('${c.id}')">
      <h3>${escapeHtml(c.nombre || 'Sin nombre')}</h3>
      <div class="email">${escapeHtml(c.email || 'Sin correo')}</div>
      <div class="card-meta">
        <span class="badge ${portal.cls}">${portal.label}</span>
      </div>
    </div>`;
  }).join('');
}

// ============ DETALLE ============
function verDetalle(id){
  clienteActualId = id;
  document.getElementById('vistaListado').classList.add('oculta');
  document.getElementById('vistaDetalle').classList.add('active');
  renderDetalle();
  cargarProyectosCliente(id);
}

function volverListado(){
  clienteActualId = null;
  document.getElementById('vistaListado').classList.remove('oculta');
  document.getElementById('vistaDetalle').classList.remove('active');
}

function renderDetalle(){
  const c = clientes.find(x => x.id === clienteActualId);
  if(!c) return;
  const portal = estadoPortal(c.email);
  document.getElementById('detalleContent').innerHTML = `
    <h2>${escapeHtml(c.nombre || 'Sin nombre')}</h2>
    <div class="email">${escapeHtml(c.email || 'Sin correo')}</div>
    <span class="badge clickable ${portal.cls}" onclick="abrirModalPortalClientes('${escapeHtml(c.email || '')}')" title="Gestionar acceso al portal de este cliente">${portal.label}</span>
    <div class="detalle-campos" style="margin-top:16px;">
      <div class="dc-item"><span class="lbl">Teléfono</span><span class="val">${escapeHtml(c.telefono || '—')}</span></div>
    </div>
    ${c.notas ? `<div class="notas-box">${escapeHtml(c.notas)}</div>` : ''}
    <div class="detalle-actions">
      <button class="btn btn-ghost" onclick="editarClienteActual()">✎ Editar</button>
    </div>
  `;
}

async function cargarProyectosCliente(clienteId){
  const cont = document.getElementById('listaProyectosCliente');
  cont.innerHTML = '<div class="empty" style="padding:24px;">Cargando...</div>';
  try{
    const snap = await proyectosRef.where('clienteId', '==', clienteId).get();
    if(snap.empty){
      cont.innerHTML = '<div class="empty" style="padding:24px;">Este cliente aún no tiene proyectos vinculados (o fueron creados antes de asignarle un cliente registrado).</div>';
      return;
    }
    cont.innerHTML = snap.docs.map(d => {
      const p = d.data();
      return `
      <a class="proy-item" href="proyecto.html?verDetalle=${d.id}">
        <span class="nombre">${escapeHtml(p.nombre || 'Sin nombre')}</span>
        <span class="etapa">${escapeHtml(p.etapaActual || '—')}</span>
      </a>`;
    }).join('');
  } catch(e){
    console.error('Error cargando proyectos del cliente:', e);
    cont.innerHTML = '<div class="empty" style="padding:24px;">No se pudieron cargar los proyectos.</div>';
  }
}

// ============ MODAL CREAR/EDITAR ============
function abrirModalNuevo(){
  editando = false;
  document.getElementById('modalTitulo').textContent = 'Nuevo Cliente';
  document.getElementById('fNombre').value = '';
  document.getElementById('fEmail').value = '';
  document.getElementById('fTelefono').value = '';
  document.getElementById('fNotas').value = '';
  document.getElementById('modalBg').classList.add('active');
}

function editarClienteActual(){
  const c = clientes.find(x => x.id === clienteActualId);
  if(!c) return;
  editando = true;
  document.getElementById('modalTitulo').textContent = 'Editar Cliente';
  document.getElementById('fNombre').value = c.nombre || '';
  document.getElementById('fEmail').value = c.email || '';
  document.getElementById('fTelefono').value = c.telefono || '';
  document.getElementById('fNotas').value = c.notas || '';
  document.getElementById('modalBg').classList.add('active');
}

function cerrarModal(){
  document.getElementById('modalBg').classList.remove('active');
}

async function guardarCliente(){
  const nombre = document.getElementById('fNombre').value.trim();
  const email = document.getElementById('fEmail').value.trim().toLowerCase();
  if(!nombre){ alert('El nombre es obligatorio.'); return; }
  const datos = {
    nombre,
    email,
    telefono: document.getElementById('fTelefono').value.trim(),
    notas: document.getElementById('fNotas').value.trim(),
    activo: true
  };
  try{
    if(editando && clienteActualId){
      await clientesRef.doc(clienteActualId).update(datos);
    } else {
      datos.fechaCreacion = firebase.firestore.FieldValue.serverTimestamp();
      await clientesRef.add(datos);
    }
    cerrarModal();
  } catch(e){
    console.error('Error guardando cliente:', e);
    alert('No se pudo guardar el cliente. Revisa la consola.');
  }
}

// ============ SEMBRAR DESDE PROYECTOS EXISTENTES ============
// Lee todos los proyectos, deduplica por clienteEmail (mismo criterio que
// getClientesUnicos() en proyecto.html) y crea un doc en 'clientes' por
// cada email que no tenga ficha todavía. No modifica los proyectos.
async function sembrarDesdeProyectos(){
  if(!confirm('Esto revisará todos los proyectos y creará una ficha de cliente para cada correo que aún no tenga una. No se modifican los proyectos. ¿Continuar?')) return;
  try{
    const snapProyectos = await proyectosRef.get();
    const yaExistentes = new Set(clientes.map(c => (c.email||'').toLowerCase()).filter(Boolean));
    const nuevos = {}; // email -> nombre
    snapProyectos.forEach(d => {
      const p = d.data();
      const email = (p.clienteEmail || '').trim().toLowerCase();
      if(!email || yaExistentes.has(email) || nuevos[email]) return;
      nuevos[email] = p.clienteArtista || email;
    });
    const emails = Object.keys(nuevos);
    if(!emails.length){
      alert('No hay clientes nuevos por sembrar — todos los correos de los proyectos existentes ya tienen ficha.');
      return;
    }
    const batch = db.batch();
    emails.forEach(email => {
      const ref = clientesRef.doc();
      batch.set(ref, {
        nombre: nuevos[email],
        email,
        telefono: '',
        notas: '',
        activo: true,
        fechaCreacion: firebase.firestore.FieldValue.serverTimestamp()
      });
    });
    await batch.commit();
    alert(`Se crearon ${emails.length} cliente(s) nuevo(s) a partir de los proyectos existentes.`);
  } catch(e){
    console.error('Error sembrando clientes:', e);
    alert('No se pudo completar la siembra. Revisa la consola.');
  }
}
</script>
